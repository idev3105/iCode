<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background Gradient (Gruvbox Dark to Darker) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#282828" />
      <stop offset="100%" stop-color="#1d2021" />
    </linearGradient>

    <!-- CPU Gradient (Gruvbox Orange to Yellow) -->
    <linearGradient id="cpu-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fe8019" />
      <stop offset="100%" stop-color="#fabd2f" />
    </linearGradient>

    <!-- Code Accent Gradient (Gruvbox Green) -->
    <linearGradient id="code-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8bb26" />
      <stop offset="100%" stop-color="#98971a" />
    </linearGradient>
    
    <!-- Shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity="0.8"/>
    </filter>

    <!-- Subtle Glow for elements -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App Icon Squircle Background -->
  <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#bg)" filter="url(#shadow)" />
  <!-- Inner subtle border for squircle -->
  <rect x="64" y="64" width="896" height="896" rx="224" fill="none" stroke="#504945" stroke-width="8" />

  <!-- CPU Outline -->
  <rect x="256" y="256" width="512" height="512" rx="80" fill="none" stroke="url(#cpu-grad)" stroke-width="48" filter="url(#glow)" />
  
  <!-- CPU Pins (Top, Right, Bottom, Left) -->
  <g fill="url(#cpu-grad)">
    <!-- Top Pins -->
    <rect x="352" y="128" width="32" height="96" rx="16" />
    <rect x="496" y="128" width="32" height="96" rx="16" />
    <rect x="640" y="128" width="32" height="96" rx="16" />
    
    <!-- Bottom Pins -->
    <rect x="352" y="800" width="32" height="96" rx="16" />
    <rect x="496" y="800" width="32" height="96" rx="16" />
    <rect x="640" y="800" width="32" height="96" rx="16" />
    
    <!-- Left Pins -->
    <rect x="128" y="352" width="96" height="32" rx="16" />
    <rect x="128" y="496" width="96" height="32" rx="16" />
    <rect x="128" y="640" width="96" height="32" rx="16" />
    
    <!-- Right Pins -->
    <rect x="800" y="352" width="96" height="32" rx="16" />
    <rect x="800" y="496" width="96" height="32" rx="16" />
    <rect x="800" y="640" width="96" height="32" rx="16" />
  </g>

  <!-- < / > Code Symbols inside the CPU -->
  <g fill="none" stroke="url(#code-grad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- < -->
    <polyline points="432,400 336,512 432,624" />
    <!-- / -->
    <line x1="560" y1="368" x2="464" y2="656" stroke-width="40" />
    <!-- > -->
    <polyline points="592,400 688,512 592,624" />
  </g>
</svg>
